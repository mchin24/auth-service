networks:
    dev-shared:
        external: true

services:
    auth-api:
        container_name: auth-api
        build: ./
        ports:
            - "3000:3000"
        command: npm run dev
        env_file:
            - .env
        environment:
            - DATABASE_URL=${DATABASE_URL}
            - NODE_OPTIONS=--experimental-vm-modules
        networks:
            - dev-shared
        volumes:
            - ./:/app
            - /app/node_modules